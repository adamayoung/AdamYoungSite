---
layout: default
---
<article class="post container">
  <header class="post-header">
    <a class="back" href="{{ '/blog/' | relative_url }}">← Back to blog</a>
    <h1 class="post-title">{{ page.title }}</h1>
    <p class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%-d %B %Y" }}</time>
      {% if page.tags and page.tags.size > 0 %}
        ·
        {% for tag in page.tags %}<span class="tag">{{ tag }}</span>{% unless forloop.last %} {% endunless %}{% endfor %}
      {% endif %}
    </p>
  </header>

  <div class="post-body">
    {{ content }}
  </div>
</article>
