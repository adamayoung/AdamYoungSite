<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#eef3f8" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#050810" media="(prefers-color-scheme: dark)">
  <meta name="format-detection" content="telephone=no">

  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }} · {{ site.tagline }}{% endif %}</title>

  <link rel="icon" type="image/jpeg" href="{{ '/assets/images/me.jpg' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/assets/images/me.jpg' | relative_url }}">
  <meta name="apple-mobile-web-app-title" content="{{ site.title }}">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="stylesheet" href="{{ '/css/styles.css' | relative_url }}?v={{ site.time | date:'%s' }}">
  <link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ '/feed.xml' | absolute_url }}">

  {% if site.google_analytics_id %}
  <link rel="preconnect" href="https://www.googletagmanager.com" crossorigin>
  <link rel="dns-prefetch" href="https://www.google-analytics.com">
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics_id }}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', '{{ site.google_analytics_id }}');
  </script>
  {% endif %}

  {% seo title=false %}
</head>
<body>
  <div class="ambient" aria-hidden="true">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
  </div>

  <nav class="nav">
    <div class="nav-inner glass">
      <a class="name" href="{{ '/' | relative_url }}">Adam Young</a>
      <div class="links">
        <a href="{{ '/blog/' | relative_url }}">Blog</a>
        <a href="{{ '/' | relative_url }}#projects">Projects</a>
        <a href="{{ '/' | relative_url }}#contact">Contact</a>
      </div>
    </div>
  </nav>
