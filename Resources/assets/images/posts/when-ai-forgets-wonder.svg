<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="An AI assistant chat bubble describing the cosmos as structured data, with a wonder field set to null">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1626"/>
      <stop offset="100%" stop-color="#040810"/>
    </linearGradient>
    <radialGradient id="nebula" cx="20%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula2" cx="85%" cy="80%" r="55%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a5b4fc"/>
    </linearGradient>
    <radialGradient id="halo1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#a5b4fc" stop-opacity="0"/>
    </radialGradient>
    <filter id="bubbleShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="14"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background cosmos -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#nebula)"/>
  <rect width="1200" height="630" fill="url(#nebula2)"/>

  <!-- Starfield -->
  <g fill="#ffffff">
    <circle cx="60"   cy="80"  r="1.0" opacity="0.55"/>
    <circle cx="140"  cy="40"  r="1.4" opacity="0.7"/>
    <circle cx="200"  cy="120" r="0.8" opacity="0.4"/>
    <circle cx="280"  cy="60"  r="1.1" opacity="0.55"/>
    <circle cx="360"  cy="140" r="1.5" opacity="0.75"/>
    <circle cx="440"  cy="50"  r="0.9" opacity="0.45"/>
    <circle cx="520"  cy="100" r="1.2" opacity="0.6"/>
    <circle cx="640"  cy="40"  r="1.0" opacity="0.55"/>
    <circle cx="780"  cy="80"  r="1.3" opacity="0.7"/>
    <circle cx="900"  cy="40"  r="0.9" opacity="0.5"/>
    <circle cx="1020" cy="100" r="1.4" opacity="0.7"/>
    <circle cx="1120" cy="60"  r="1.0" opacity="0.55"/>

    <circle cx="80"   cy="240" r="1.2" opacity="0.6"/>
    <circle cx="220"  cy="270" r="0.9" opacity="0.45"/>
    <circle cx="60"   cy="380" r="1.4" opacity="0.7"/>
    <circle cx="180"  cy="440" r="0.9" opacity="0.5"/>
    <circle cx="100"  cy="520" r="1.5" opacity="0.75"/>
    <circle cx="220"  cy="580" r="1.0" opacity="0.55"/>

    <circle cx="980"  cy="240" r="0.9" opacity="0.45"/>
    <circle cx="1100" cy="290" r="1.3" opacity="0.65"/>
    <circle cx="1040" cy="400" r="1.0" opacity="0.55"/>
    <circle cx="1140" cy="460" r="1.5" opacity="0.75"/>
    <circle cx="980"  cy="540" r="0.9" opacity="0.5"/>
    <circle cx="1080" cy="590" r="1.2" opacity="0.6"/>

    <circle cx="370"  cy="540" r="1.0" opacity="0.5"/>
    <circle cx="540"  cy="580" r="0.9" opacity="0.45"/>
    <circle cx="720"  cy="560" r="1.4" opacity="0.7"/>
    <circle cx="860"  cy="590" r="1.0" opacity="0.55"/>
  </g>

  <!-- A few brighter wonder-stars with halos — the thing AI is missing -->
  <g>
    <circle cx="140"  cy="380" r="22" fill="url(#halo1)"/>
    <circle cx="140"  cy="380" r="2.5" fill="#ffffff"/>
    <circle cx="1080" cy="200" r="22" fill="url(#halo2)"/>
    <circle cx="1080" cy="200" r="2.5" fill="#ffffff"/>
  </g>

  <!-- Title -->
  <text x="600" y="92" text-anchor="middle" font-family="-apple-system, SF Pro Display, system-ui, sans-serif" font-size="46" font-weight="600" fill="url(#title)" letter-spacing="-1.4">When AI Forgets Wonder</text>
  <text x="600" y="124" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="17" font-weight="400" fill="#8b95a8" letter-spacing="0.3">How we lose ourselves by thinking less</text>

  <!-- AI chat bubble — what AI "sees" when given the cosmos -->
  <g filter="url(#bubbleShadow)">
    <!-- Bubble -->
    <rect x="320" y="180" width="560" height="320" rx="22" fill="#0f1623" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
    <!-- Subtle top inner highlight -->
    <path d="M 342 180 Q 342 180 342 180 L 858 180 Q 880 180 880 202 L 880 220 L 320 220 L 320 202 Q 320 180 342 180 Z" fill="rgba(255,255,255,0.025)"/>
    <!-- Tail (pointing down-left toward the cosmos) -->
    <path d="M 360 500 L 350 528 L 386 500 Z" fill="#0f1623" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
  </g>

  <!-- Bubble header: AI sparkle + label -->
  <g transform="translate(348, 218)">
    <!-- 4-point sparkle -->
    <path d="M 11 0 L 13 9 L 22 11 L 13 13 L 11 22 L 9 13 L 0 11 L 9 9 Z" fill="#22d3ee"/>
  </g>
  <text x="384" y="237" font-family="-apple-system, sans-serif" font-size="14" font-weight="500" fill="#8b95a8" letter-spacing="0.4">AI Assistant</text>

  <!-- Subtle divider under header -->
  <line x1="348" y1="258" x2="852" y2="258" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- AI's response: structured data, with `wonder: null` -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="18">
    <text x="358" y="298" fill="#c9d1d9">{</text>
    <text x="358" y="328"><tspan fill="#c9d1d9">  </tspan><tspan fill="#79c0ff">"objects"</tspan><tspan fill="#c9d1d9">: </tspan><tspan fill="#79c0ff">4096</tspan><tspan fill="#c9d1d9">,</tspan></text>
    <text x="358" y="358"><tspan fill="#c9d1d9">  </tspan><tspan fill="#79c0ff">"type"</tspan><tspan fill="#c9d1d9">: </tspan><tspan fill="#a5d6ff">"starfield"</tspan><tspan fill="#c9d1d9">,</tspan></text>
    <text x="358" y="388"><tspan fill="#c9d1d9">  </tspan><tspan fill="#79c0ff">"luminosity"</tspan><tspan fill="#c9d1d9">: </tspan><tspan fill="#79c0ff">0.43</tspan><tspan fill="#c9d1d9">,</tspan></text>
    <text x="358" y="418"><tspan fill="#c9d1d9">  </tspan><tspan fill="#79c0ff">"wonder"</tspan><tspan fill="#c9d1d9">: </tspan><tspan fill="#ff7b72">null</tspan></text>
    <text x="358" y="448" fill="#c9d1d9">}</text>
  </g>

  <!-- Footer -->
  <text x="600" y="603" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" fill="#525866" letter-spacing="0.5">adam-young.co.uk</text>
</svg>
