<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Canon TDD — the Red, Green, Refactor loop preceded by a Test List step">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1626"/>
      <stop offset="100%" stop-color="#040810"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="25%" r="60%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="80%" r="55%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#9aa6b8"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <text x="60" y="100" font-family="-apple-system, SF Pro Display, Helvetica, Arial, sans-serif"
        font-size="56" font-weight="700" fill="url(#title)" letter-spacing="-1.5">Canon TDD</text>
  <text x="60" y="140" font-family="-apple-system, SF Pro Text, Helvetica, Arial, sans-serif"
        font-size="22" font-weight="500" fill="#9aa6b8" letter-spacing="0.5">Red · Green · Refactor — and the step everyone forgets.</text>

  <!-- Test List card (the often-forgotten step) -->
  <g transform="translate(60, 230)">
    <rect width="240" height="180" rx="20" fill="#0f1a2e" stroke="#22d3ee" stroke-opacity="0.45" stroke-width="1.5"/>
    <text x="20" y="42" font-family="-apple-system, SF Pro Text, Helvetica, Arial, sans-serif"
          font-size="13" font-weight="600" fill="#22d3ee" letter-spacing="2">STEP 1</text>
    <text x="20" y="78" font-family="-apple-system, SF Pro Display, Helvetica, Arial, sans-serif"
          font-size="26" font-weight="700" fill="#e8edf5">Test list</text>
    <line x1="20" y1="98" x2="120" y2="98" stroke="#3a4a66" stroke-width="1.5"/>
    <g font-family="-apple-system, SF Mono, Menlo, monospace" font-size="13" fill="#9aa6b8">
      <text x="20" y="124">☐ Empty list returns 0</text>
      <text x="20" y="144">☐ Single number</text>
      <text x="20" y="164">☐ Negative numbers…</text>
    </g>
  </g>

  <!-- Arrow into the cycle -->
  <line x1="320" y1="320" x2="380" y2="320" stroke="#9aa6b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Red -->
  <g transform="translate(420, 230)">
    <rect width="200" height="180" rx="20" fill="#2c0a12" stroke="#ef4444" stroke-opacity="0.6" stroke-width="1.5"/>
    <circle cx="40" cy="48" r="12" fill="#ef4444"/>
    <text x="20" y="100" font-family="-apple-system, SF Pro Display, Helvetica, Arial, sans-serif"
          font-size="32" font-weight="700" fill="#fca5a5" letter-spacing="-0.5">Red</text>
    <text x="20" y="135" font-family="-apple-system, SF Pro Text, Helvetica, Arial, sans-serif"
          font-size="14" fill="#9aa6b8">Write one</text>
    <text x="20" y="155" font-family="-apple-system, SF Pro Text, Helvetica, Arial, sans-serif"
          font-size="14" fill="#9aa6b8">failing test.</text>
  </g>

  <!-- Arrow Red → Green -->
  <line x1="640" y1="320" x2="700" y2="320" stroke="#9aa6b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Green -->
  <g transform="translate(740, 230)">
    <rect width="200" height="180" rx="20" fill="#0a2218" stroke="#22c55e" stroke-opacity="0.6" stroke-width="1.5"/>
    <circle cx="40" cy="48" r="12" fill="#22c55e"/>
    <text x="20" y="100" font-family="-apple-system, SF Pro Display, Helvetica, Arial, sans-serif"
          font-size="32" font-weight="700" fill="#86efac" letter-spacing="-0.5">Green</text>
    <text x="20" y="135" font-family="-apple-system, SF Pro Text, Helvetica, Arial, sans-serif"
          font-size="14" fill="#9aa6b8">Make it pass.</text>
    <text x="20" y="155" font-family="-apple-system, SF Pro Text, Helvetica, Arial, sans-serif"
          font-size="14" fill="#9aa6b8">Dirty is fine.</text>
  </g>

  <!-- Arrow Green → Refactor -->
  <line x1="960" y1="320" x2="1020" y2="320" stroke="#9aa6b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Refactor -->
  <g transform="translate(1020, 230)">
    <rect width="120" height="180" rx="20" fill="#241a05" stroke="#f59e0b" stroke-opacity="0.6" stroke-width="1.5"/>
    <circle cx="40" cy="48" r="12" fill="#f59e0b"/>
    <text x="20" y="100" font-family="-apple-system, SF Pro Display, Helvetica, Arial, sans-serif"
          font-size="22" font-weight="700" fill="#fcd34d" letter-spacing="-0.5">Refactor</text>
    <text x="20" y="135" font-family="-apple-system, SF Pro Text, Helvetica, Arial, sans-serif"
          font-size="13" fill="#9aa6b8">Tidy up.</text>
    <text x="20" y="153" font-family="-apple-system, SF Pro Text, Helvetica, Arial, sans-serif"
          font-size="13" fill="#9aa6b8">Optional.</text>
  </g>

  <!-- Loop arrow back to Red -->
  <path d="M 1080 410 Q 1080 500 520 500 Q 420 500 420 410"
        fill="none" stroke="#9aa6b8" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrow)"/>
  <text x="700" y="535" font-family="-apple-system, SF Pro Text, Helvetica, Arial, sans-serif"
        font-size="14" fill="#9aa6b8" text-anchor="middle">repeat until the test list is empty</text>
</svg>
