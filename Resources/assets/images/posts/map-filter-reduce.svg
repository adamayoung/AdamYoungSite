<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Map, Filter and Reduce — three diagrams showing how each operation transforms a list of numbers">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1626"/>
      <stop offset="100%" stop-color="#040810"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="85%" r="55%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Title block -->
  <text x="600" y="98" text-anchor="middle" font-family="-apple-system, SF Pro Display, system-ui, sans-serif" font-size="46" font-weight="600" fill="url(#title)" letter-spacing="-1.4">Map · Filter · Reduce</text>
  <text x="600" y="132" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="15" fill="#8b95a8" letter-spacing="0.4">Three handy tools for transforming sequences in Swift</text>

  <!-- Column dividers -->
  <line x1="400" y1="190" x2="400" y2="540" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="800" y1="190" x2="800" y2="540" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- ===== MAP ===== -->
  <g transform="translate(200, 0)">
    <text x="0" y="225" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="28" font-weight="600" fill="#22d3ee" letter-spacing="-0.6">map</text>

    <g font-family="-apple-system, sans-serif" font-size="16" font-weight="500" fill="#ffffff">
      <circle cx="-90" cy="285" r="22" fill="rgba(34,211,238,0.12)" stroke="#22d3ee" stroke-width="1.4"/><text x="-90" y="291" text-anchor="middle">1</text>
      <circle cx="-30" cy="285" r="22" fill="rgba(34,211,238,0.12)" stroke="#22d3ee" stroke-width="1.4"/><text x="-30" y="291" text-anchor="middle">2</text>
      <circle cx="30"  cy="285" r="22" fill="rgba(34,211,238,0.12)" stroke="#22d3ee" stroke-width="1.4"/><text x="30"  y="291" text-anchor="middle">3</text>
      <circle cx="90"  cy="285" r="22" fill="rgba(34,211,238,0.12)" stroke="#22d3ee" stroke-width="1.4"/><text x="90"  y="291" text-anchor="middle">4</text>
    </g>

    <text x="0" y="350" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, monospace" font-size="13" fill="#a1a1aa">{ $0 * 2 }</text>

    <path d="M 0 365 L 0 405 M -8 397 L 0 405 L 8 397" stroke="#22d3ee" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <g font-family="-apple-system, sans-serif" font-size="16" font-weight="600" fill="#0a1424">
      <circle cx="-90" cy="450" r="22" fill="#22d3ee"/><text x="-90" y="456" text-anchor="middle">2</text>
      <circle cx="-30" cy="450" r="22" fill="#22d3ee"/><text x="-30" y="456" text-anchor="middle">4</text>
      <circle cx="30"  cy="450" r="22" fill="#22d3ee"/><text x="30"  y="456" text-anchor="middle">6</text>
      <circle cx="90"  cy="450" r="22" fill="#22d3ee"/><text x="90"  y="456" text-anchor="middle">8</text>
    </g>
  </g>

  <!-- ===== FILTER ===== -->
  <g transform="translate(600, 0)">
    <text x="0" y="225" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="28" font-weight="600" fill="#67e8f9" letter-spacing="-0.6">filter</text>

    <g font-family="-apple-system, sans-serif" font-size="16" font-weight="500">
      <circle cx="-90" cy="285" r="22" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.18)" stroke-width="1.4"/><text x="-90" y="291" text-anchor="middle" fill="#525866">1</text>
      <circle cx="-30" cy="285" r="22" fill="rgba(103,232,249,0.14)" stroke="#67e8f9" stroke-width="1.4"/><text x="-30" y="291" text-anchor="middle" fill="#ffffff">2</text>
      <circle cx="30"  cy="285" r="22" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.18)" stroke-width="1.4"/><text x="30"  y="291" text-anchor="middle" fill="#525866">3</text>
      <circle cx="90"  cy="285" r="22" fill="rgba(103,232,249,0.14)" stroke="#67e8f9" stroke-width="1.4"/><text x="90"  y="291" text-anchor="middle" fill="#ffffff">4</text>
    </g>

    <text x="0" y="350" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, monospace" font-size="13" fill="#a1a1aa">{ $0 % 2 == 0 }</text>

    <path d="M 0 365 L 0 405 M -8 397 L 0 405 L 8 397" stroke="#67e8f9" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <g font-family="-apple-system, sans-serif" font-size="16" font-weight="600" fill="#0a1424">
      <circle cx="-30" cy="450" r="22" fill="#67e8f9"/><text x="-30" y="456" text-anchor="middle">2</text>
      <circle cx="30"  cy="450" r="22" fill="#67e8f9"/><text x="30"  y="456" text-anchor="middle">4</text>
    </g>
  </g>

  <!-- ===== REDUCE ===== -->
  <g transform="translate(1000, 0)">
    <text x="0" y="225" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="28" font-weight="600" fill="#818cf8" letter-spacing="-0.6">reduce</text>

    <g font-family="-apple-system, sans-serif" font-size="16" font-weight="500" fill="#ffffff">
      <circle cx="-90" cy="285" r="22" fill="rgba(129,140,248,0.14)" stroke="#818cf8" stroke-width="1.4"/><text x="-90" y="291" text-anchor="middle">1</text>
      <circle cx="-30" cy="285" r="22" fill="rgba(129,140,248,0.14)" stroke="#818cf8" stroke-width="1.4"/><text x="-30" y="291" text-anchor="middle">2</text>
      <circle cx="30"  cy="285" r="22" fill="rgba(129,140,248,0.14)" stroke="#818cf8" stroke-width="1.4"/><text x="30"  y="291" text-anchor="middle">3</text>
      <circle cx="90"  cy="285" r="22" fill="rgba(129,140,248,0.14)" stroke="#818cf8" stroke-width="1.4"/><text x="90"  y="291" text-anchor="middle">4</text>
    </g>

    <text x="0" y="350" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, monospace" font-size="13" fill="#a1a1aa">(0, +)</text>

    <path d="M 0 365 L 0 405 M -8 397 L 0 405 L 8 397" stroke="#818cf8" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <g font-family="-apple-system, sans-serif" font-size="22" font-weight="700" fill="#0a1424">
      <circle cx="0" cy="455" r="32" fill="#818cf8"/><text x="0" y="463" text-anchor="middle">10</text>
    </g>
  </g>

  <text x="600" y="588" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" fill="#525866" letter-spacing="0.5">adam-young.co.uk</text>
</svg>
